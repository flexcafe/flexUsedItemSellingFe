name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate app
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: https://example.com/api
      EXPO_PUBLIC_FACEBOOK_APP_ID: placeholder
      EXPO_PUBLIC_FACEBOOK_PAGE_URL: https://www.facebook.com/example
      EXPO_PUBLIC_PUSHER_KEY: placeholder
      EXPO_PUBLIC_PUSHER_CLUSTER: placeholder
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
